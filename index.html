<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKED</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#00ff41;
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  overflow:hidden;
  cursor:none;
}

/* CURSOR */
.cursor{
  position:fixed;width:16px;height:16px;
  border:2px solid #00ff41;
  border-radius:50%;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:all .05s;
  box-shadow:0 0 8px #00ff41;
}

/* MATRIX CANVAS */
#matrix{
  position:fixed;inset:0;z-index:0;opacity:.18;
}

/* OVERLAY GELAP */
.overlay{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,.7) 100%);
  pointer-events:none;
}

/* SCANLINES */
.scanlines{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px
  );
}

/* MAIN CONTENT */
.main{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
  text-align:center;
}

/* SKULL */
.skull{
  font-size:5rem;
  animation:skullPulse 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 20px #ff0000);
  margin-bottom:10px;
  display:block;
}
@keyframes skullPulse{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px #ff0000);}
  50%{transform:scale(1.08);filter:drop-shadow(0 0 40px #ff0000);}
}

/* HACKED TITLE */
.hacked-title{
  font-family:'VT323',monospace;
  font-size:clamp(3.5rem,15vw,7rem);
  color:#ff0000;
  letter-spacing:8px;
  text-transform:uppercase;
  line-height:1;
  margin-bottom:4px;
  animation:glitch 2s infinite;
  position:relative;
  text-shadow:
    0 0 20px #ff0000,
    0 0 40px #ff0000,
    0 0 80px #ff0000;
}
.hacked-title::before,.hacked-title::after{
  content:'WEB IS HACKED';
  position:absolute;top:0;left:0;right:0;
}
.hacked-title::before{
  color:#0ff;
  animation:glitchBefore 2s infinite;
  clip-path:polygon(0 0,100% 0,100% 35%,0 35%);
}
.hacked-title::after{
  color:#f0f;
  animation:glitchAfter 2s infinite;
  clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);
}
@keyframes glitch{
  0%,90%,100%{transform:translate(0);}
  91%{transform:translate(-3px,1px);}
  92%{transform:translate(3px,-1px);}
  93%{transform:translate(-2px,2px);}
  94%{transform:translate(2px,-2px);}
  95%{transform:translate(0);}
}
@keyframes glitchBefore{
  0%,90%,100%{transform:translate(0);}
  91%{transform:translate(3px,0);}
  93%{transform:translate(-3px,0);}
  95%{transform:translate(0);}
}
@keyframes glitchAfter{
  0%,90%,100%{transform:translate(0);}
  91%{transform:translate(-3px,0);}
  93%{transform:translate(3px,0);}
  95%{transform:translate(0);}
}

/* BY KENZ */
.by-kenz{
  font-size:.85rem;
  color:rgba(0,255,65,.55);
  letter-spacing:6px;
  text-transform:uppercase;
  margin-bottom:32px;
}

/* DIVIDER */
.divider{
  width:300px;max-width:90vw;
  height:1px;
  background:linear-gradient(90deg,transparent,#ff0000,transparent);
  margin:0 auto 28px;
  box-shadow:0 0 10px #ff0000;
}

/* PESAN BOX */
.pesan-box{
  background:rgba(0,0,0,.85);
  border:1px solid #ff0000;
  border-radius:4px;
  padding:24px 28px;
  max-width:560px;
  width:90%;
  box-shadow:
    0 0 20px rgba(255,0,0,.3),
    inset 0 0 20px rgba(255,0,0,.05);
  position:relative;
  animation:borderPulse 2s ease-in-out infinite;
}
@keyframes borderPulse{
  0%,100%{box-shadow:0 0 20px rgba(255,0,0,.3),inset 0 0 20px rgba(255,0,0,.05);}
  50%{box-shadow:0 0 40px rgba(255,0,0,.6),inset 0 0 30px rgba(255,0,0,.1);}
}

.pesan-box::before{
  content:'[ PESAN DARI HACKER ]';
  position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  background:#000;padding:0 12px;
  font-size:.65rem;color:#ff0000;letter-spacing:3px;
  white-space:nowrap;
}

.pesan-txt{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(.82rem,2.5vw,.98rem);
  color:#00ff41;
  line-height:1.85;
  text-align:left;
  animation:typing 0s;
}
.pesan-txt .red{color:#ff4444;font-weight:bold;}
.pesan-txt .blink{animation:blinkTxt .8s step-end infinite;}
@keyframes blinkTxt{0%,100%{opacity:1}50%{opacity:0}}

/* PROGRESS BAR */
.progress-wrap{
  width:90%;max-width:560px;
  margin-top:24px;
}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:.7rem;color:rgba(0,255,65,.6);
  margin-bottom:6px;letter-spacing:2px;
}
.progress-bar{
  height:6px;background:rgba(0,255,65,.1);
  border-radius:2px;overflow:hidden;
  border:1px solid rgba(0,255,65,.2);
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#00ff41,#ff0000);
  width:0%;
  animation:fillBar 4s ease forwards 1s;
  box-shadow:0 0 10px #00ff41;
}
@keyframes fillBar{to{width:100%;}}

/* STATUS LOG */
.status-log{
  width:90%;max-width:560px;
  background:rgba(0,0,0,.9);
  border:1px solid rgba(0,255,65,.2);
  border-radius:4px;
  padding:12px 16px;
  margin-top:14px;
  text-align:left;
  max-height:110px;
  overflow:hidden;
}
.log-line{
  font-size:.68rem;
  color:rgba(0,255,65,.5);
  line-height:1.8;
  opacity:0;
  animation:showLine .3s ease forwards;
}
.log-line.red-log{color:rgba(255,68,68,.7);}
@keyframes showLine{to{opacity:1;}}

/* IP BOX */
.ip-box{
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
  margin-top:18px;width:90%;max-width:560px;
}
.ip-card{
  background:rgba(0,0,0,.8);
  border:1px solid rgba(0,255,65,.2);
  border-radius:4px;padding:10px 18px;
  flex:1;min-width:140px;
}
.ip-label{font-size:.6rem;color:rgba(0,255,65,.45);letter-spacing:2px;display:block;margin-bottom:4px;}
.ip-val{font-size:.85rem;color:#00ff41;}

/* FOOTER */
.footer-txt{
  margin-top:28px;
  font-size:.65rem;
  color:rgba(0,255,65,.25);
  letter-spacing:3px;
  animation:blinkTxt 2s step-end infinite;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="matrix"></canvas>
<div class="overlay"></div>
<div class="scanlines"></div>

<div class="main">
  <span class="skull">💀</span>

  <div class="hacked-title">WEB IS HACKED</div>
  <div class="by-kenz">by kenz</div>

  <div class="divider"></div>

  <div class="pesan-box">
    <div class="pesan-txt" id="pesanTxt"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>DATA EXTRACTED</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  </div>

  <div class="status-log" id="statusLog"></div>

  <div class="ip-box">
    <div class="ip-card">
      <span class="ip-label">TARGET IP</span>
      <span class="ip-val" id="targetIp">...</span>
    </div>
    <div class="ip-card">
      <span class="ip-label">STATUS</span>
      <span class="ip-val" style="color:#ff4444;">COMPROMISED</span>
    </div>
    <div class="ip-card">
      <span class="ip-label">FILES LEAKED</span>
      <span class="ip-val" id="fileCount">0</span>
    </div>
  </div>

  <div class="footer-txt">[ PRESS ANY KEY TO CONTINUE... ]</div>
</div>

<script>
// CURSOR
document.addEventListener('mousemove',e=>{
  const c=document.getElementById('cursor');
  c.style.left=e.clientX+'px'; c.style.top=e.clientY+'px';
});

// MATRIX RAIN
const canvas=document.getElementById('matrix');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
const cols=Math.floor(canvas.width/14);
const drops=Array(cols).fill(1);
const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ<>{}[]|\\/*&^%$#@!';
function drawMatrix(){
  ctx.fillStyle='rgba(0,0,0,.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#00ff41'; ctx.font='13px Share Tech Mono';
  drops.forEach((y,i)=>{
    const c=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(c,i*14,y*14);
    if(y*14>canvas.height&&Math.random()>.975) drops[i]=0;
    drops[i]++;
  });
}
setInterval(drawMatrix,40);

// RANDOM IP
function randIp(){ return Array(4).fill(0).map(()=>Math.floor(Math.random()*255)).join('.'); }
document.getElementById('targetIp').textContent=randIp();

// PESAN TYPING EFFECT
const PESAN = `Yah makanya jan macem macem ama gua <span class="red">bangsat</span> 💀\nKena hacked juga kan web nya?\n<span class="red">Tolol bego lu semua</span> wkwkwk 😂\n\nData lu udah gua ambil semua.\nMakanya lain kali jaga sikap 😎<span class="blink">_</span>`;

let i=0;
const el=document.getElementById('pesanTxt');
const stripped=PESAN.replace(/<[^>]+>/g,'');
let htmlOut='';
let inTag=false, tagBuf='';

function typeChar(){
  if(i>=PESAN.length){ el.innerHTML=PESAN; return; }
  const ch=PESAN[i];
  if(ch==='<') inTag=true;
  if(inTag){ tagBuf+=ch; if(ch==='>'){inTag=false;htmlOut+=tagBuf;tagBuf='';} }
  else htmlOut+=ch;
  el.innerHTML=htmlOut+(inTag?'':'<span class="blink">_</span>');
  i++;
  setTimeout(typeChar, inTag?0:28);
}
setTimeout(typeChar,800);

// STATUS LOG
const LOGS=[
  '[+] Koneksi berhasil...',
  '[+] Bypass firewall... OK',
  '[+] Akses database... GRANTED',
  '[!] Password ditemukan',
  '[+] Upload backdoor... DONE',
  '[!] Admin offline — perfect timing',
  '[+] Exfiltrating data...',
  '[!] 1,337 files leaked 😂',
  '[+] Jejak dihapus... DONE',
  '[!] Selesai. Jangan macem-macem lagi ya 👋',
];
const logEl=document.getElementById('statusLog');
LOGS.forEach((l,i)=>{
  setTimeout(()=>{
    const d=document.createElement('div');
    d.className='log-line'+(l.includes('[!')?' red-log':'');
    d.textContent=l;
    d.style.animationDelay='0s';
    logEl.appendChild(d);
    logEl.scrollTop=logEl.scrollHeight;
  },1200+i*700);
});

// FILE COUNTER
let fc=0;
const fcEl=document.getElementById('fileCount');
const fcInt=setInterval(()=>{
  fc+=Math.floor(Math.random()*47+13);
  if(fc>=1337){ fc=1337; clearInterval(fcInt); }
  fcEl.textContent=fc.toLocaleString();
},120);

// PROGRESS PERCENTAGE
const pfill=document.getElementById('pFill');
const pct=document.getElementById('pct');
let p=0;
const pInt=setInterval(()=>{
  p+=Math.random()*2;
  if(p>=100){ p=100; clearInterval(pInt); }
  pct.textContent=Math.floor(p)+'%';
},80);

// RESIZE
window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
});

// GLITCH SOUND EFFECT (visual)
setInterval(()=>{
  document.body.style.filter=`hue-rotate(${Math.random()*20}deg)`;
  setTimeout(()=>document.body.style.filter='',60);
},3000);
</script>
</body>
</html>
