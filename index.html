<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX UNITED FC | REKRUTMEN</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; }

        /* INTRO SCREEN */
        #intro { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        .logo-intro { width: 280px; transition: 0.5s; filter: drop-shadow(0 0 20px var(--gold)); }
        .shatter { animation: shatterAnim 0.8s forwards; pointer-events: none; }
        @keyframes shatterAnim { 
            0% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(3); opacity: 0; filter: blur(30px); } 
        }

        /* MAIN CONTENT */
        #main-web { opacity: 0; transition: 1.5s; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-box { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        
        .step { display: none; animation: fadeIn 0.5s forwards; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: var(--gold); text-transform: uppercase; margin: 10px 0; letter-spacing: 2px; }
        label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 10px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid var(--gold); border-radius: 10px; color: #fff; font-size: 1rem; box-sizing: border-box; text-align: center; outline: none; }
        
        .btn { background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }

        /* FINAL OVERLAY FULL SCREEN 🎉 */
        #finish-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            border: 8px solid var(--gold); box-sizing: border-box; text-align: center;
        }
        .tiktok-box { background:#ff0050; padding:20px; border-radius:15px; margin:30px; box-shadow: 0 0 25px #ff0050; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="intro" onclick="startWeb()">
        <img src="https://i.ibb.co.com/W499dt6m/IMG-20260301-091044.jpg" class="logo-intro" id="logo">
        <p style="margin-top: 30px; color: var(--gold); letter-spacing: 5px; font-weight: bold;">TAP TO ENTER</p>
    </div>

    <div id="main-web">
        <div class="form-box">
            <img src="https://i.ibb.co.com/W499dt6m/IMG-20260301-091044.jpg" style="width: 80px; margin-bottom: 10px; border-radius: 50%;">
            <h2>APEX UNITED FC</h2>
            
            <form id="regForm">
                <div class="step active" id="s1">
                    <label>SIAPA NAMA LU, COK?</label>
                    <input type="text" id="nama" placeholder="Ketik Nama Anda..." autocomplete="off">
                    <button type="button" class="btn" onclick="nextStep(2)">LANJUT</button>
                </div>

                <div class="step" id="s2">
                    <label>PILIH GENDER</label>
                    <select id="gender">
                        <option>COWOK</option>
                        <option>CEWEK</option>
                        <option>PRIVAT</option>
                    </select>
                    <button type="button" class="btn" onclick="nextStep(3)">LANJUT</button>
                </div>

                <div class="step" id="s3">
                    <label>UMUR LU BERAPA?</label>
                    <select id="umur"></select>
                    <button type="button" class="btn" onclick="nextStep(4)">LANJUT</button>
                </div>

                <div class="step" id="s4">
                    <label>PERNAH MAIN DI FC LAIN?</label>
                    <select id="exCheck" onchange="toggleExInput()">
                        <option value="TIDAK">BELUM PERNAH</option>
                        <option value="YA">PERNAH</option>
                    </select>
                    <div id="exInputDiv" style="display:none;">
                        <input type="text" id="namaFC" placeholder="Nama FC Sebelum Lu?">
                    </div>
                    <button type="button" class="btn" onclick="nextStep(5)">LANJUT</button>
                </div>

                <div class="step" id="s5">
                    <label>JUMLAH GOL DI BROOKHAVEN?</label>
                    <input type="number" id="gol" placeholder="0">
                    <button type="button" class="btn" onclick="finish()">SUBMIT PENDAFTARAN</button>
                </div>
            </form>
        </div>
    </div>

    <div id="finish-overlay">
        <h1 style="color:var(--gold); font-size: 3rem; margin: 0;">BERHASIL! 🎉</h1>
        <p style="font-size: 1.2rem;">Data lu udah masuk ke Tuan R4VENGPT.</p>
        
        <div class="tiktok-box">
            <h3 style="margin:0; color:#fff;">WAJIB DM TIKTOK:</h3>
            <h1 style="margin:0; font-size: 2rem; color:#fff;">apex.united.fc</h1>
        </div>
        
        <p style="opacity: 0.7;">Segera verifikasi sebelum kuota penuh!</p>
        <button class="btn" style="width:200px; margin-top: 20px;" onclick="location.reload()">OKE LORD</button>
    </div>

    <script>
        // Fungsi Intro Shatter
        function startWeb() {
            const logo = document.getElementById('logo');
            logo.classList.add('shatter');
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('main-web').style.opacity = '1';
                document.body.style.overflow = 'auto';
            }, 800);
        }

        // Fungsi Tampilkan Input FC Lain
        function toggleExInput() {
            const val = document.getElementById('exCheck').value;
            document.getElementById('exInputDiv').style.display = (val === "YA") ? "block" : "none";
        }

        // Fungsi Navigasi Form satu per satu
        function nextStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + n).classList.add('active');
        }

        // Fungsi Selesai & Party Effect 🎉
        function finish() {
            document.getElementById('finish-overlay').style.display = 'flex';
            // Pesta Konfeti Rame
            confetti({
                particleCount: 250,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#d4af37', '#ffffff', '#ff0050']
            });
        }

        // Generate List Umur (6 - 80 Tahun)
        const uSelect = document.getElementById('umur');
        for(let i=18; i<=80; i++) {
            uSelect.innerHTML += `<option value="${i}">${i} Tahun (18+)</option>`;
        }
        for(let i=17; i>=6; i--) {
            uSelect.innerHTML += `<option value="${i}">${i} Tahun</option>`;
        }
    </script>
</body>
</html>
